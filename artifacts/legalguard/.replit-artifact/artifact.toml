kind = "web"
previewPath = "/"
title = "LegalGuard AI"
version = "1.0.0"
id = "artifacts/legalguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25248

[services.development]
run = "pnpm --filter @workspace/legalguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legalguard", "run", "build" ]
publicDir = "artifacts/legalguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25248"
BASE_PATH = "/"
